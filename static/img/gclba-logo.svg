<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="240" height="200">
  <defs>
    <linearGradient id="sky" x1="30%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#56C4F0"/>
      <stop offset="45%" stop-color="#3AABE0"/>
      <stop offset="100%" stop-color="#1F7DB8"/>
    </linearGradient>
    <linearGradient id="earth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DC462"/>
      <stop offset="100%" stop-color="#3DA335"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1F7DB8" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#2A96CC"/>
      <stop offset="100%" stop-color="#56C4F0"/>
    </linearGradient>
  </defs>

  <!-- Swoosh arc — thin teal curve under and around diamond -->
  <path d="M 32 120 C 50 158, 100 168, 145 158 C 175 150, 198 130, 210 100"
        fill="none" stroke="url(#arc)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Diamond (rotated square) -->
  <g transform="translate(120, 78)">
    <!-- Blue sky portion (upper area of diamond) -->
    <rect x="-50" y="-50" width="100" height="100" rx="6" ry="6"
          transform="rotate(45)"
          fill="url(#sky)"/>

    <!-- Green earth portion (lower-left triangle, clipped to diamond) -->
    <clipPath id="diamond-clip">
      <rect x="-50" y="-50" width="100" height="100" rx="6" ry="6"
            transform="rotate(45)"/>
    </clipPath>
    <polygon points="-71,0 0,71 0,0"
             fill="url(#earth)" clip-path="url(#diamond-clip)"/>

    <!-- White highlight edge between blue and green -->
    <line x1="-50" y1="50" x2="0" y2="0"
          stroke="white" stroke-width="1" stroke-opacity="0.3"
          clip-path="url(#diamond-clip)"/>
  </g>
</svg>
