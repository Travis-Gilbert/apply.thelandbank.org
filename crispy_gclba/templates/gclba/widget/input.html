<input
  type="{{ widget.type|default:'text' }}"
  name="{{ widget.name }}"
  {% if widget.value != None %}value="{{ widget.value }}"{% endif %}
  {% for attr_name, attr_val in widget.attrs.items %}
    {{ attr_name }}="{{ attr_val }}"
  {% endfor %}
  class="
    w-full px-3.5 py-2.5
    text-sm text-gray-900 placeholder:text-gray-400
    bg-white border border-gray-300 rounded-md
    shadow-sm
    transition-all duration-150
    focus:border-civic-green-600 focus:ring-2 focus:ring-civic-green-600/20 focus:outline-none
    {% if widget.attrs.has_error %}
      border-red-400 bg-red-50/30
    {% endif %}
    disabled:opacity-50 disabled:cursor-not-allowed
  "
/>
