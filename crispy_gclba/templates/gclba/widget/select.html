<div class="relative">
  <select
    name="{{ widget.name }}"
    {% for attr_name, attr_val in widget.attrs.items %}
      {{ attr_name }}="{{ attr_val }}"
    {% endfor %}
    class="
      w-full px-3.5 py-2.5 pr-10
      text-sm text-gray-900
      bg-white border border-gray-300 rounded-md
      shadow-sm appearance-none cursor-pointer
      transition-all duration-150
      focus:border-civic-green-600 focus:ring-2 focus:ring-civic-green-600/20 focus:outline-none
      {% if widget.attrs.has_error %}
        border-red-400 bg-red-50/30
      {% endif %}
      disabled:opacity-50 disabled:cursor-not-allowed
    "
  >
    {% for group_name, group_choices, group_index in widget.optgroups %}
      {% for option in group_choices %}
      <option
        value="{{ option.value }}"
        {% if option.selected %}selected{% endif %}
      >{{ option.label }}</option>
      {% endfor %}
    {% endfor %}
  </select>
  <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 4.5L6 7.5L9 4.5"/>
    </svg>
  </div>
</div>
