{# Collapsed program summary bar #}
<div class="summary-bar">
    <div class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0"
         style="background: {{ program_color }}15">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="{{ program_color }}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5"/>
        </svg>
    </div>
    <div class="flex-1 min-w-0">
        <span class="text-sm font-semibold text-warm-800">Program</span>
        <span class="text-warm-500 mx-1.5">&middot;</span>
        <span class="text-sm text-warm-500">{{ program_name }}</span>
    </div>
    <button type="button"
            hx-get="{{ edit_url }}"
            hx-target="#section-program"
            hx-swap="outerHTML"
            aria-label="Edit Program"
            class="text-xs font-medium flex-shrink-0 px-2.5 py-1 rounded-md transition-colors hover:bg-warm-100"
            style="color: {{ program_color }}">
        Edit
    </button>
</div>
