{# Centered divider with hint text - shows only above active section #}
{# Include with: hint_text (optional, e.g. "Next: Contact Information") #}
{# Safe horizontal padding prevents text touching screen edges on mobile #}
<div class="section-divider" style="padding-left: 1rem; padding-right: 1rem;">
    {% if hint_text %}
    <span class="text-[11px] text-warm-400 whitespace-nowrap">{{ hint_text }}</span>
    {% endif %}
</div>
