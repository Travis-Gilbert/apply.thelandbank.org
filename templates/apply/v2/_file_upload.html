{# Drag-drop file upload area with file list #}
{# Include with: field_name, label, required (bool), hint (optional), accept, multiple (bool) #}
<div class="space-y-2">
    <div class="flex items-baseline justify-between gap-2">
        <label class="block text-sm font-medium text-warm-900">
            {{ label }}{% if required %} <span class="text-red-500 text-xs">*</span>{% endif %}
        </label>
    </div>

    {# Drop zone #}
    <label class="flex flex-col items-center justify-center gap-2 p-6 rounded-xl border-2 border-dashed border-warm-300 bg-warm-50/50 cursor-pointer hover:border-warm-400 hover:bg-warm-50 transition-colors"
           id="dropzone-{{ field_name }}">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-warm-400">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="17 8 12 3 7 8" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="12" y1="3" x2="12" y2="15" stroke-linecap="round"/>
        </svg>
        <p class="text-sm text-warm-500">
            <span class="font-medium" style="color:#2E7D32">Choose files</span> or drag and drop
        </p>
        <p class="text-xs text-warm-400">PDF, JPG, PNG up to 10MB each</p>
        <input type="file"
               name="{{ field_name }}"
               accept="{{ accept|default:'image/*,.pdf' }}"
               {% if multiple %}multiple{% endif %}
               class="hidden"
               onchange="handleFileList(this, '{{ field_name }}')">
    </label>

    {# File list #}
    <div id="filelist-{{ field_name }}" class="space-y-1.5"></div>

    {% if hint %}
    <p class="text-xs text-warm-400 leading-relaxed">{{ hint }}</p>
    {% endif %}
</div>
