{% extends "base.html" %}

{% block title %}Save Your Progress — GCLBA Application{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto text-center py-12 px-4">
    <div class="mx-auto w-16 h-16 bg-civic-green-50 rounded-full flex items-center justify-center mb-6">
        <svg class="w-8 h-8 text-civic-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
    </div>

    <h2 class="font-heading text-3xl font-bold text-warm-900 mb-4">Check Your Email</h2>

    <p class="text-warm-600 mb-6">
        We've sent a link to <strong class="text-warm-900">{{ email }}</strong> that you can use to resume your
        application at any time within the next <span class="font-mono">14 days</span>.
    </p>

    <a href="/apply/"
       class="inline-flex items-center px-4 py-2.5 text-sm font-medium text-civic-green-700 bg-civic-green-50 border border-civic-green-200 rounded-xl hover:bg-civic-green-100 transition-colors">
        &larr; Continue Application Now
    </a>
</div>
{% endblock %}
