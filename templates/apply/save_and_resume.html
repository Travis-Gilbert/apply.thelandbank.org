{% extends "base.html" %}

{% block title %}Save Your Progress — GCLBA Application{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto text-center py-12">
    <div class="mx-auto w-16 h-16 bg-gclba-100 rounded-full flex items-center justify-center mb-6">
        <svg class="w-8 h-8 text-gclba-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
    </div>

    <h2 class="text-2xl font-bold text-gray-900 mb-4">Check Your Email</h2>

    <p class="text-gray-600 mb-6">
        We've sent a link to <strong>{{ email }}</strong> that you can use to resume your
        application at any time within the next 14 days.
    </p>

    <a href="/apply/"
       class="inline-flex items-center px-4 py-2 text-sm font-medium text-gclba-700 bg-gclba-50 border border-gclba-200 rounded-md hover:bg-gclba-100 transition-colors">
        &larr; Continue Application Now
    </a>
</div>
{% endblock %}
