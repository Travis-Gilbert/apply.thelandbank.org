{# {% include "apply/_section_label.html" with text="Personal Details" icon="👤" %} #}
{# Add blue=True for blue variant: {% include "apply/_section_label.html" with text="Mailing Address" blue=True icon="📍" %} #}
<div class="flex items-center gap-3 px-5 py-3.5 -mx-5 sm:-mx-7 -mt-5 sm:-mt-7 mb-6
            border-b border-warm-200/40"
     style="background: linear-gradient(180deg, rgba(250, 248, 244, 0.65) 0%, rgba(250, 248, 244, 0.15) 100%);">
    {% if icon %}
    <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-sm"
         style="background: {% if blue %}rgba(45, 106, 138, 0.07); border: 1px solid rgba(45, 106, 138, 0.14){% else %}rgba(46, 125, 50, 0.07); border: 1px solid rgba(46, 125, 50, 0.14){% endif %};">
        {{ icon }}
    </div>
    {% endif %}
    <h3 class="font-heading text-[15px] font-semibold text-warm-900">{{ text }}</h3>
</div>
