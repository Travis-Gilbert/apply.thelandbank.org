{# Usage: {% include "admin/partials/_status_badge.html" with status=obj.status label=obj.get_status_display %} #}
{# Badge colors defined in gclba_theme.css — dark mode handled automatically #}
<span class="badge text-12 font-bold px-8 py-4
  {% if status == 'received' %}badge-blue
  {% elif status == 'under_review' %}badge-amber
  {% elif status == 'needs_more_info' %}badge-orange
  {% elif status == 'approved' %}badge-green
  {% elif status == 'declined' %}badge-red
  {% else %}badge{% endif %}">
  {{ label }}
</span>
