{# Usage: {% include "admin/partials/_status_badge.html" with status=obj.status label=obj.get_status_display %} #}
<span class="inline-flex px-2 py-0.5 rounded-full text-xs font-bold
  {% if status == 'received' %}bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200
  {% elif status == 'under_review' %}bg-amber-100 text-amber-800 dark:bg-amber-900 dark:text-amber-200
  {% elif status == 'needs_more_info' %}bg-orange-100 text-orange-800 dark:bg-orange-900 dark:text-orange-200
  {% elif status == 'approved' %}bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200
  {% elif status == 'declined' %}bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200
  {% else %}bg-gray-100 text-gray-700{% endif %}">
  {{ label }}
</span>
